<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Semanal - Equipo COT</title>
    <link rel="stylesheet" href="horario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <h1>EQUIPO COT - Gestión de Horarios</h1>
            </div>
            
            <div class="group-controls">
                <nav class="group-selector" id="groupSelector">
                    <!-- Groups will be injected by JS -->
                </nav>
                <button id="addGroupBtn" class="icon-btn" title="Agregar Grupo">
                    <i class="fas fa-folder-plus"></i>
                </button>
            </div>
            
            <!-- User search area removed as all groups use the button selector now -->
            
            <nav class="user-selector" id="userSelector" style="display: none;">
                <!-- Legacy container, hidden but kept for JS stability -->
            </nav>

            <div class="action-bar">
                <button id="addCourseBtn" class="primary-btn">
                    <i class="fas fa-plus"></i> Agregar Curso
                </button>
                <button id="importCSVBtn" class="primary-btn-outline">
                    <i class="fas fa-file-csv"></i> Importar CSV
                </button>
                <button id="returnToPtcBtn" class="primary-btn-outline" style="display: none; border-color: #ef4444; color: #ef4444;">
                    <i class="fas fa-undo"></i> Volver a PTC
                </button>
                <input type="file" id="csvInput" accept=".csv" style="display: none;">
            </div>
        </header>

        <main class="schedule-grid-container">
            <div id="scheduleGrid" class="schedule-grid">
                <div class="grid-header">
                    <div class="time-col">Hora</div>
                    <div class="day-col">Lunes</div>
                    <div class="day-col">Martes</div>
                    <div class="day-col">Miércoles</div>
                    <div class="day-col">Jueves</div>
                    <div class="day-col">Viernes</div>
                    <div class="day-col">Sábado</div>
                    <div class="day-col">Domingo</div>
                </div>
                
                <div class="grid-body" id="gridBody">
                    <!-- Rows will be injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <div style="margin-top: 50px; text-align: center; border-top: 1px solid #f1f5f9; padding-top: 20px; padding-bottom: 20px;">
        <button id="masterBtn" style="background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 5px; transition: color 0.3s;">
            <i class="fas fa-shield-alt"></i> Acceso Master
        </button>
    </div>

    <!-- Modal for Adding/Editing Course -->
    <div id="courseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Curso</h2>
                <span class="close" style="cursor:pointer">&times;</span>
            </div>
            <form id="courseForm">
                <input type="hidden" id="courseId">
                <input type="hidden" id="clickedDay">
                
                <div class="form-group">
                    <label for="courseUserSelect">Usuario</label>
                    <select id="courseUserSelect" required>
                        <option value="TODOS">👥 TODOS (Evento Conjunto)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="courseName">Nombre del Curso</label>
                    <input type="text" id="courseName" required placeholder="Ej: Matematica">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="courseSection">Sección (Opcional)</label>
                        <input type="text" id="courseSection" placeholder="Ej: 222M">
                    </div>
                    <div class="form-group">
                        <label for="courseNRC">NRC (Opcional)</label>
                        <input type="text" id="courseNRC" placeholder="Ej: 1331">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="courseRoom">Salón (Opcional)</label>
                        <input type="text" id="courseRoom" placeholder="Ej: A-301">
                    </div>
                    <div class="form-group">
                        <label for="courseModality">Modalidad</label>
                        <select id="courseModality" required>
                            <option value="Presencial">Presencial</option>
                            <option value="Virtual">Virtual</option>
                            <option value="Híbrido">Híbrido</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="courseSede">Sede</label>
                    <select id="courseSede" required>
                        <option value="AQP">AQP</option>
                        <option value="SURCO">SURCO</option>
                        <option value="NOR">NOR</option>
                        <option value="SJL">SJL</option>
                        <option value="VIRTUAL">VIRTUAL</option>
                        <option value="VES">VES</option>
                        <option value="OTROS">OTROS</option>
                    </select>
                </div>
                
                <div id="schedulesContainer">
                    <!-- Schedule blocks will be injected here -->
                </div>
                
                <div class="form-group" style="margin-top: 10px;">
                    <button type="button" id="addScheduleBlockBtn" class="primary-btn-outline" style="width: 100%;">
                        <i class="fas fa-plus"></i> Agregar otro horario
                    </button>
                </div>

                
                <div class="delete-options hidden" id="deleteOptions">
                    <button type="button" id="deleteDayBtn" class="danger-btn-outline">Eliminar solo este día</button>
                    <button type="button" id="deleteBtn" class="danger-btn">Eliminar todo el curso</button>
                </div>

                <div class="form-actions">
                    <button type="submit" class="success-btn">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="horario.js"></script>
</body>
</html>
